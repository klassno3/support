<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Contact Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ── Palette (matches your palette.ts) ── */
        :root {
            --background: #D2E8FF;
            --primary: #D2E8FF;
            --primary-light: #d2e8ff57;
            --text-main: #2C2C2C;
            --secondary-text: #7A7A7A;
            --white: #FFFFFF;
            --font: 'Fira Mono', monospace;
        }

        body {
            font-family: var(--font);
            background-color: var(--background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
        }

        /* ── PageHeader ── */
        .page-header {
            width: 100%;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            color: var(--text-main);
        }

        .page-header h1 {
            font-family: var(--font);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            flex: 1;
            text-align: center;
        }

        .header-spacer {
            width: 28px;
        }

        /* ── Card ── */
        .card {
            width: 100%;
            max-width: 480px;
            background: var(--primary);
            border: 2px solid var(--text-main);
            border-radius: 12px;
            box-shadow: 8px 7px 0px var(--text-main);
            padding: 15px;
        }

        .card-title {
            font-family: var(--font);
            font-size: 18px;
            font-weight: 500;
            color: var(--text-main);
            text-align: center;
            margin-bottom: 20px;
        }

        .label {
            font-family: var(--font);
            font-size: 16px;
            color: var(--text-main);
            margin-bottom: 8px;
            display: block;
        }

        .field {
            margin-bottom: 20px;
            position: relative;
        }

        /* ── Dropdown trigger ── */
        .dropdown-trigger {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1.5px solid var(--text-main);
            border-radius: 5px;
            padding: 10px 12px;
            background: var(--white);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-main);
            cursor: pointer;
        }

        .chevron {
            transition: transform 0.2s ease;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        /* ── Dropdown menu ── */
        .dropdown-menu {
            position: absolute;
            z-index: 10;
            width: 100%;
            background: var(--white);
            border: 1px solid gray;
            border-radius: 5px;
            padding: 10px;
            margin-top: 4px;
            display: none;
        }

        .dropdown-menu.open {
            display: block;
        }

        .dropdown-menu button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 5px;
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-main);
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .dropdown-menu button:hover,
        .dropdown-menu button.selected {
            background: var(--primary-light);
        }

        /* ── Textarea (matches InputField multiline) ── */
        textarea {
            width: 100%;
            border: 1.5px solid var(--text-main);
            border-radius: 5px;
            padding: 7px 10px;
            background: var(--white);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-main);
            resize: none;
            height: 100px;
            line-height: 1.5;
        }

        textarea::placeholder {
            color: #aaa;
        }

        textarea:focus {
            outline: none;
        }

        /* ── Textarea (matches InputField multiline) ── */
        input {
            width: 100%;
            border: 1.5px solid var(--text-main);
            border-radius: 5px;
            padding: 7px 10px;
            background: var(--white);
            font-family: var(--font);
            font-size: 14px;
            color: var(--text-main);
            resize: none;
            line-height: 1.5;
        }

        input::placeholder {
            color: #aaa;
        }

        input:focus {
            outline: none;
        }

        /* ── Button (pill, white variant, medium) ── */
        .submit-btn {
            width: 100%;
            padding: 8px 30px;
            background: var(--white);
            color: var(--text-main);
            border: 1.5px solid var(--text-main);
            border-radius: 100px;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 5px 3px 0px var(--text-main);
            transition: transform 0.1s, box-shadow 0.1s;
            margin-top: 4px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translate(-1px, -1px);
            box-shadow: 6px 4px 0px var(--text-main);
        }

        .submit-btn:active:not(:disabled) {
            transform: translate(3px, 2px);
            box-shadow: 2px 1px 0px var(--text-main);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ── Footer note ── */
        .footer-note {
            font-family: var(--font);
            font-size: 14px;
            color: var(--secondary-text);
            text-align: center;
            margin-top: 20px;
        }

        .footer-note a {
            color: var(--secondary-text);
        }

        /* ── Status ── */
        .status {
            font-family: var(--font);
            font-size: 13px;
            text-align: center;
            margin-top: 12px;
            padding: 8px 12px;
            border-radius: 5px;
            display: none;
        }

        .status.success {
            display: block;
            color: #27ae60;
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid rgba(39, 174, 96, 0.3);
        }

        .status.error {
            display: block;
            color: #c0392b;
            background: rgba(192, 57, 43, 0.1);
            border: 1px solid rgba(192, 57, 43, 0.3);
        }
    </style>
</head>

<body>



    <div class="card">
        <p class="card-title">We'd love to hear from you!</p>
        <div class="field">
            <span class="label">Name</span>
            <input type="text" id="name" placeholder="Your Name"></input>
        </div>
        <div class="field">
            <span class="label">Email</span>
            <input id="email" placeholder="Your Email" type="email"></input>
        </div>
        <div class="field">
            <span class="label">Subject Options</span>
            <button type="button" class="dropdown-trigger" id="trigger">
                <span id="subject-label">Select Subject</span>
                <svg class="chevron" id="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9" />
                </svg>
            </button>
            <div class="dropdown-menu" id="dropdown-menu">
                <button type="button" data-value="General Question">General Question</button>
                <button type="button" data-value="Technical Issue">Technical Issue</button>
                <button type="button" data-value="Prayer Content Question">Prayer Content Question</button>
                <button type="button" data-value="Reminder Not Working">Reminder Not Working</button>
                <button type="button" data-value="Audio Not Playing">Audio Not Playing</button>
                <button type="button" data-value="Other">Other</button>
            </div>
        </div>


        <div class="field">
            <span required min-length="10" class="label">Message</span>
            <textarea id="message" placeholder="Your Message"></textarea>
        </div>

        <div style="padding: 5px;">
            <button class="submit-btn" id="submit-btn" type="button">Send Message</button>
        </div>

        <div class="status" id="status"></div>

        <p class="footer-note">
            You can also contact me at
            <a href="mailto:betelhemkirub@gmail.com">betelhemkirub@gmail.com</a>
        </p>
    </div>

    <script>
        // ─────────────────────────────────────────
        //  ⚠️ REPLACE WITH YOUR EMAILJS VALUES
        // ─────────────────────────────────────────
        const PUBLIC_KEY = "Wbrx9VKHYYWcL3mTW";
        const SERVICE_ID = 'service_4prj8x7';
        const TEMPLATE_ID = 'template_0a11c3a';
        // ─────────────────────────────────────────

        emailjs.init({ publicKey: PUBLIC_KEY });

        const trigger = document.getElementById('trigger');
        const menu = document.getElementById('dropdown-menu');
        const subjectLabel = document.getElementById('subject-label');
        const chevron = document.getElementById('chevron');
        const submitBtn = document.getElementById('submit-btn');
        const nameEl = document.getElementById('name');
        const emailEl = document.getElementById('email');
        const messageEl = document.getElementById('message');
        const statusEl = document.getElementById('status');
        let selectedValue = '';

        trigger.addEventListener('click', () => {
            const isOpen = menu.classList.toggle('open');
            chevron.classList.toggle('open', isOpen);
        });

        menu.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                selectedValue = btn.dataset.value;
                subjectLabel.textContent = selectedValue;
                menu.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                menu.classList.remove('open');
                chevron.classList.remove('open');
            });
        });

        document.addEventListener('click', e => {
            if (!trigger.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('open');
                chevron.classList.remove('open');
            }
        });

        submitBtn.addEventListener('click', async () => {
            statusEl.className = 'status';
            statusEl.textContent = '';

            if (!selectedValue) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Please select a subject.';
                return;
            }
            if (!messageEl.value.trim()) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Please write a message.';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending…';

            try {
                const res = await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                    subject: selectedValue,
                    name: nameEl.value.trim(),
                    email: emailEl.value.trim(),
                    message: messageEl.value.trim(),
                });
                console.log('EmailJS response:', res);
                statusEl.className = 'status success';
                statusEl.textContent = "✓ Message sent! I'll get back to you soon.";
                messageEl.value = '';
                selectedValue = '';
                subjectLabel.textContent = 'Select Subject';
                menu.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
            } catch (err) {
                console.error(err);
                statusEl.className = 'status error';
                statusEl.textContent = 'Something went wrong. Please try again or email me directly.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });
    </script>
</body>

</html>
